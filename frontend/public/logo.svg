<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <style>
      .logo-fill { fill: #811c1d; }
    </style>
  </defs>
  
  <!-- Логотип EG слева -->
  <g transform="translate(80,80)" class="logo-fill">
    <!-- Верхний угол -->
    <polygon points="0,55 28,0 188,0 60,32" />
    <!-- Нижний угол -->
    <polygon points="210,190 182,245 22,245 150,213" />
    <!-- Буквы E и G -->
    <text
      x="70"
      y="135"
      font-family="Montserrat, Arial, sans-serif"
      font-weight="700"
      font-size="110"
      fill="#811c1d"
    >
      EG
    </text>
  </g>
  
  <!-- Текст ENTECH GROUP справа -->
  <g transform="translate(430,120)">
    <text
      font-family="Montserrat, SF Pro Display, Arial, sans-serif"
      font-weight="600"
      font-size="80"
      letter-spacing="0.35em"
      fill="#811c1d"
      y="0"
    >
      ENTECH
    </text>
    <text
      font-family="Montserrat, SF Pro Display, Arial, sans-serif"
      font-weight="600"
      font-size="80"
      letter-spacing="0.30em"
      fill="#811c1d"
      y="110"
    >
      GROUP
    </text>
  </g>
</svg>

